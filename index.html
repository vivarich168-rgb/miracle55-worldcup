<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle55 - FIFA Worldcup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-zone">
        <h1>🏆⚽ Miracle55 FIFA Worldcup 2026 ⚽🏆</h1>
        <p class="sub-title">ชิงเงินรางวัลรวม 100,000 บาท</p>
    </div>

    <div id="loginSection" class="login-card">
        <h3 style="text-align:center; color:#58a6ff; margin-top:0;">👤 กรอกข้อมูลผู้เล่นเพื่อเริ่มทายผล</h3>
        <input type="text" id="username" placeholder="Username เช่น marke123">
        <input type="text" id="fullName" placeholder="ชื่อ-นามสกุลจริง สำหรับติดต่อรับรางวัล">
        <button style="width:100%;" onclick="checkAndLoginUser()">เข้าสู่ระบบ & เปิดตารางทายผล</button>
        <p class="warning">* เวอร์ชันนี้แก้กันกดส่งซ้ำ, เก็บทายผลได้ทุกรอบ และรองรับกรณีสกอร์เสมอให้เลือกทีมเข้ารอบ</p>
    </div>

    <div id="loginStatus" class="status-ok"></div>

    <div class="mini-card" id="topScorerCard" style="display:none; text-align:center;">
        <div style="font-size:13px; color:#58a6ff; font-weight:800; margin-bottom:8px;">⚽ ดาวซัลโว Golden Boot 🥇</div>
        <input type="text" id="top-scorer-guess" placeholder="พิมพ์ชื่อนักเตะ...">
    </div>

    <div class="bracket-wrapper" id="bracketSection" style="display:none;">
        <div class="bracket-column" id="col-r32-left"></div>
        <div class="bracket-column" id="col-r16-left"></div>
        <div class="bracket-column" id="col-r8-left"></div>
        <div class="bracket-column" id="col-r4-left"></div>

        <div class="center-column">
            <div id="finalBlock"></div>
            <div id="thirdBlock"></div>
            <button class="btn-submit-all" onclick="savePredictions()">🚀 ส่งผลการทายทั้งหมด</button>
            <button class="btn-muted" onclick="loadLeaderboard()">ดูอันดับคะแนน</button>
        </div>

        <div class="bracket-column" id="col-r4-right"></div>
        <div class="bracket-column" id="col-r8-right"></div>
        <div class="bracket-column" id="col-r16-right"></div>
        <div class="bracket-column" id="col-r32-right"></div>
    </div>

    <div class="leaderboard-card" id="leaderboardCard" style="display:none; max-width:760px;">
        <h3 style="color:#58a6ff; margin-top:0;">🏅 ตารางคะแนน</h3>
        <div id="leaderboardContent"></div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
