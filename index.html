<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle55 - FIFA Worldcup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .header-zone { text-align: center; margin-bottom: 20px; }
        h1 { color: #58a6ff; }
        .login-card { max-width: 450px; margin: 0 auto 20px auto; background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .bracket-wrapper { display: flex; justify-content: space-between; overflow-x: auto; padding: 20px 0; }
        .match-block { background: linear-gradient(145deg, #1e252e, #161b22); border: 1px solid #30363d; border-radius: 8px; padding: 8px; margin-bottom: 10px; transition: transform 0.3s; }
        .match-block:hover { transform: scale(1.02); border-color: #58a6ff; }
        .team-row { display: flex; justify-content: space-between; align-items: center; background-color: #21262d; padding: 6px 10px; border-radius: 4px; font-size: 13px; margin-bottom: 4px; }
        
        /* สไตล์ตารางคะแนน */
        #score-container { max-width: 600px; margin: 20px auto; animation: fadeIn 1.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .rank-1 { background-color: #ffd700 !important; color: #000 !important; font-weight: bold; }
        .rank-2 { background-color: #c0c0c0 !important; color: #000 !important; }
        .rank-3 { background-color: #cd7f32 !important; color: #fff !important; }
    </style>
</head>
<body>

<div class="header-zone">
    <h1>🏆⚽Miracle55 FIFA Worldcup 2026 ⚽🏆</h1>
</div>

<div id="loginSection" class="login-card">
    <h3>👤 กรอกข้อมูลผู้เล่น</h3>
    <input type="text" id="username" placeholder="ชื่อ Username">
    <input type="text" id="fullName" placeholder="ชื่อ-นามสกุลจริง">
    <button style="width:100%; padding:12px; background:#1f6feb; border:none; color:white; border-radius:6px; cursor:pointer;" onclick="checkAndLoginUser()">เข้าสู่ระบบ</button>
</div>

<div id="bracketSection" class="bracket-wrapper" style="display: none;">
    </div>

<div id="score-container">
    <h3>ตารางคะแนนผู้เล่น (Top 20)</h3>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #161b22;">
                <th style="padding: 10px;">อันดับ</th><th>Username</th><th style="padding: 10px;">คะแนน</th>
            </tr>
        </thead>
        <tbody id="scoreBody"></tbody>
    </table>
</div>

<script>
    let currentUser = null;

    async function checkAndLoginUser() {
        const username = document.getElementById('username').value.trim();
        const fullName = document.getElementById('fullName').value.trim();
        if(!username) return alert('กรอก Username ด้วยครับ');

        let { data: user, error } = await supabaseClient.from('users').select('*').eq('username', username).single();
        if (error && error.code === 'PGRST116') {
            const { data: newUser } = await supabaseClient.from('users').insert([{ username, full_name: fullName, total_points:0 }]).select().single();
            user = newUser;
        }
        currentUser = user;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('bracketSection').style.display = 'flex';
    }

    async function loadScores() {
        const { data, error } = await supabaseClient
            .from('users')
            .select('username, total_points')
            .order('total_points', { ascending: false })
            .limit(20); 

        if (error) { console.error("ดึงข้อมูลไม่ได้:", error); return; }

        const tbody = document.getElementById('scoreBody');
        tbody.innerHTML = '';
        data.forEach((u, index) => {
            // เพิ่มสีให้ 3 อันดับแรก
            let rowClass = '';
            if(index === 0) rowClass = 'rank-1';
            else if(index === 1) rowClass = 'rank-2';
            else if(index === 2) rowClass = 'rank-3';

            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td style="text-align:center; padding: 8px;">${index + 1}</td>
                    <td style="padding: 8px;">${u.username}</td>
                    <td style="text-align:right; padding: 8px;">${u.total_points}</td>
                </tr>`;
        });
    }

    loadScores();
</script>

</body>
</html>
