<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Miracle55 - FIFA Worldcup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 20px; }
        .login-card { max-width: 450px; margin: 20px auto; background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; }
        .btn { padding: 10px 20px; background: #1f6feb; color: white; border: none; cursor: pointer; }
        #bracketSection, #score-container { display: none; }
    </style>
</head>
<body>
    <h1>🏆 Miracle55 FIFA Worldcup 2026 🏆</h1>

    <div id="loginSection" class="login-card">
        <input type="text" id="username" placeholder="Username">
        <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <div id="bracketSection">
        <h3>คู่เปิดสนาม</h3>
        <p>ทีม A vs ทีม B</p>
    </div>

    <div id="score-container">
        <h3>ตารางคะแนน (Top 20)</h3>
        <table border="1" style="width:90%; margin:auto; border-collapse:collapse;">
            <tbody id="scoreBody"></tbody>
        </table>
    </div>

    <script>
        // แก้ไขให้เรียก window.supabaseClient ให้ชัดเจน
        async function login() {
            const username = document.getElementById('username').value;
            const { data, error } = await window.supabaseClient.from('users').select('*').eq('username', username).single();
            if(data) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('bracketSection').style.display = 'block';
                document.getElementById('score-container').style.display = 'block';
                loadScores();
            } else {
                alert('ไม่พบข้อมูล: ' + (error ? error.message : 'กรุณาเช็ค Policy ใน Supabase'));
            }
        }
        
        async function loadScores() {
            const { data } = await window.supabaseClient.from('users').select('username, total_points').order('total_points', { ascending: false });
            if(data) {
                document.getElementById('scoreBody').innerHTML = data.map(u => `<tr><td>${u.username}</td><td>${u.total_points}</td></tr>`).join('');
            }
        }
    </script>
</body>
</html>
