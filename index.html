<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Miracle55 - FIFA Worldcup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 20px; }
        .bracket-wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .match-block { background: #161b22; border: 1px solid #30363d; padding: 10px; border-radius: 8px; width: 160px; text-align: center; }
        .leaderboard-section { max-width: 600px; margin: 40px auto; background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #30363d; text-align: center; }
    </style>
</head>
<body>

<div style="text-align: center;"><h1>🏆 Miracle55 FIFA Worldcup 2026 🏆</h1></div>

<div id="loginSection" style="max-width: 400px; margin: 20px auto; background: #161b22; padding: 20px; border-radius: 10px;">
    <input type="text" id="username" placeholder="Username" style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <button onclick="handleLogin()" style="width: 100%; padding: 10px; background: #1f6feb; color: white; border: none;">เข้าสู่ระบบ</button>
</div>

<div class="bracket-wrapper" id="bracketSection" style="display: none;">
    <div class="match-block">คู่ที่ 1<br>ทีม A vs ทีม B</div>
    <div class="match-block">คู่ที่ 2<br>ทีม C vs ทีม D</div>
</div>

<div class="leaderboard-section">
    <h3>🏆 ตารางคะแนน Leaderboard</h3>
    <table>
        <thead><tr><th>อันดับ</th><th>Username</th><th>คะแนน</th></tr></thead>
        <tbody id="leaderboardBody"><tr><td colspan="3">รอโหลดข้อมูล...</td></tr></tbody>
    </table>
</div>

<script>
    const supabaseClient = supabase.createClient("https://qbqjogfflfnsldjkpiog.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFicWpvZ2ZmbGZuc2xkamtwaW9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzA5ODcsImV4cCI6MjA5NTY0Njk4N30.Gbi0Z814_hW5Z3nzaOr_icMRkguTGsziUbl_7Sy4zAU");

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        if (!username) return alert('กรุณากรอก Username');
        
        // ใช้ maybeSingle() ป้องกัน Error ถ้าไม่มี User
        const { data, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('username', username)
            .maybeSingle();

        if (error) {
            console.error("Login Error:", error);
            return alert("เกิดข้อผิดพลาดในการดึงข้อมูล");
        }

        if (data) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('bracketSection').style.display = 'flex';
            alert('ยินดีต้อนรับกลับมา ' + data.username);
        } else {
            alert('ไม่พบชื่อผู้ใช้นี้');
        }
    }

    async function loadLeaderboard() {
        const { data, error } = await supabaseClient
            .from('users')
            .select('username, total_points')
            .order('total_points', { ascending: false })
            .limit(20);
        
        if (data) {
            document.getElementById('leaderboardBody').innerHTML = data.map((u, i) => 
                `<tr><td>${i+1}</td><td>${u.username}</td><td>${u.total_points}</td></tr>`
            ).join('');
        } else {
            document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="3">ไม่มีข้อมูล</td></tr>';
        }
    }

    // โหลดตารางทันทีที่เปิดหน้าเว็บ
    loadLeaderboard();
</script>
</body>
</html>
