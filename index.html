<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Miracle55 - FIFA Worldcup 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { background-color: #0d1117; color: #fff; text-align: center; font-family: sans-serif; }
        table { width: 90%; max-width: 600px; margin: 20px auto; border-collapse: collapse; }
        td, th { padding: 10px; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <h1>🏆 Miracle55 FIFA Worldcup 2026 🏆</h1>
    
    <h3>ตารางคะแนนผู้เล่น (Top 20)</h3>
    <table id="scoreTable">
        <thead><tr><th>อันดับ</th><th>Username</th><th>คะแนน</th></tr></thead>
        <tbody id="scoreBody"></tbody>
    </table>

    <script>
        // ฟังก์ชันโหลดคะแนนที่นิ่งที่สุด
        async function loadScores() {
            const { data } = await window.supabaseClient.from('users').select('username, total_points').order('total_points', { ascending: false }).limit(20);
            const tbody = document.getElementById('scoreBody');
            tbody.innerHTML = data.map((u, i) => `<tr><td>${i+1}</td><td>${u.username}</td><td>${u.total_points}</td></tr>`).join('');
        }
        loadScores();
    </script>
</body>
</html>
